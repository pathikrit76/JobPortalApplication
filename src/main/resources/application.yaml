spring:
  application:
    name: jobportal

#server:
#  port: 8081
#  servlet:
#    context-path: /backend
#debug : true
  output:
    ansi:
      enabled: ALWAYS
  devtools:
    restart:
      enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

logging:
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)"








